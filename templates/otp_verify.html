<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Verify Your Identity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
      <style>
          :root {
              --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --text: #f8fafc;
                          --text-sub: #94a3b8;
            --border: rgba(255,255,255,0.1);
}
        body {
                      font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
}
        .otp-card {
                      background: var(--card);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}
        .icon-box {
                      width: 64px; height: 64px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            color: var(--primary);
}
        h1 { font-size: 24px; font-weight: 600; margin: 0 0 8px; }
        p { color: var(--text-sub); font-size: 15px; margin-bottom: 32px; line-height: 1.5; }
        .email-display { color: var(--text); font-weight: 500; }

        .otp-inputs {
                      display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
}
        .otp-inputs input {
                      width: 50px; height: 60px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            outline: none;
            transition: all 0.2s;
}
        .otp-inputs input:focus {
                      border-color: var(--primary);
            background: rgba(56, 189, 248, 0.05);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
}

        .verify-btn {
                      width: 100%;
            color: #0f172a;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
}
        .verify-btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .resend {
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-sub);
}
        .resend a { color: var(--primary); text-decoration: none; font-weight: 500; }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
                        padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
}
    </style>
</head>
<body>
    <div class="otp-card">
        <div class="icon-box">
                  <i data-lucide="shield-check" size="32"></i>
              </div>
        <h1>Two-Step Verification</h1>
              <p>We've sent a 6-digit code to <br><span class="email-display">{{ email }}</span></p>

{% if error %}
        <div class="error-msg" style="display: block;">
              <i data-lucide="alert-circle" style="vertical-align: middle; margin-right: 4px;"></i>
          {{ error }}
        </div>
      {% endif %}

                  <form action="/verify_otp" method="POST">
                  <div class="otp-inputs">
                <input type="text" maxlength="1" onkeyup="moveFocus(this, 1)" id="otp1" name="otp1" required autofocus>
                          <input type="text" maxlength="1" onkeyup="moveFocus(this, 2)" id="otp2" name="otp2" required>
                          <input type="text" maxlength="1" onkeyup="moveFocus(this, 3)" id="otp3" name="otp3" required>
                          <input type="text" maxlength="1" onkeyup="moveFocus(this, 4)" id="otp4" name="otp4" required>
                          <input type="text" maxlength="1" onkeyup="moveFocus(this, 5)" id="otp5" name="otp5" required>
                          <input type="text" maxlength="1" id="otp6" name="otp6" required>
                      </div>
                      <button type="submit" class="verify-btn">Verify Account</button>
                  </form>

                  <div class="resend">
                      Didn't receive the code? <a href="#">Resend Code</a>
                  </div>
              </div>

              <script>
                  lucide.createIcons();
        function moveFocus(current, nextIndex) {
            if (current.value.length === 1) {
                const nextInput = document.getElementById('otp' + (nextIndex + 1));
                if (nextInput) nextInput.focus();
            }
        }
    </script>
      </body>
      </html>

            background: var(--primary)
