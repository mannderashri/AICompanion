        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
          background: var(--surface);
          color: var(--text-1);
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          transition: background 0.3s ease, color 0.3s ease;
          overflow-x: hidden;
          padding: 20px;
        }

        /* Animated background elements */
        .bg-blobs {
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          z-index: -1;
          overflow: hidden;
        }
        .blob {
          position: absolute;
          width: 40vw;
          height: 40vw;
          background: var(--primary-glow);
          filter: blur(80px);
          border-radius: 50%;
          animation: float 20s infinite alternate;
        }
        .blob-1 { top: -10%; left: -10%; }
        .blob-2 { bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes float {
          0%   { transform: translate(0, 0) rotate(0deg); }
          100% { transform: translate(10%, 10%) rotate(10deg); }
        }

        .login-wrapper {
          width: 100%;
          max-width: 440px;
          position: relative;
        }

        .login-card {
          background: var(--glass);
          backdrop-filter: blur(20px);
          border: 1px solid var(--border);
          border-radius: 24px;
          padding: 40px;
          box-shadow: var(--card-shadow);
          z-index: 10;
          animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
          from { transform: translateY(20px); opacity: 0; }
          to   { transform: translateY(0); opacity: 1; }
        }

        .brand {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 12px;
          margin-bottom: 32px;
        }
        .logo-box {
          width: 48px;
          height: 48px;
          background: var(--primary);
          border-radius: 12px;
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
          box-shadow: 0 8px 16px var(--primary-glow);
        }
        .brand h1 {
          font-size: 24px;
          font-weight: 700;
          color: var(--text-1);
          letter-spacing: -0.5px;
        }
        .brand p {
          font-size: 14px;
          color: var(--text-2);
        }

        .field-group {
          margin-bottom: 20px;
        }
        label {
          display: block;
          font-size: 14px;
          font-weight: 600;
          margin-bottom: 8px;
          color: var(--text-1);
        }
        .field-wrap {
          position: relative;
        }

        .field-wrap input {
          width: 100%;
          padding: 12px 16px;
          padding-left: 44px;
          background: var(--surface-2);
          border: 1px solid var(--border);
          border-radius: 12px;
          color: var(--text-1);
          font-size: 15px;
          transition: all 0.2s ease;
        }
        .field-wrap input:focus {
          outline: none;
          border-color: var(--primary);
          background: var(--surface);
          box-shadow: 0 0 0 4px var(--primary-glow);
        }
        .field-wrap i {
          position: absolute;
          left: 14px;
          top: 50%;
          transform: translateY(-50%);
          color: var(--text-3);
          transition: color 0.2s ease;
        }
        .field-wrap input:focus + i {
          color: var(--primary);
        }

        .eye-btn {
          position: absolute;
          right: 12px;
          top: 50%;
          transform: translateY(-50%);
          background: none;
          border: none;
          color: var(--text-3);
          cursor: pointer;
          padding: 4px;
          border-radius: 6px;
          transition: all 0.2s ease;
        }
        .eye-btn:hover {
          background: var(--surface-3);
          color: var(--text-2);
        }

        .options {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 24px;
          font-size: 14px;
        }
        .remember {
          display: flex;
          align-items: center;
          gap: 8px;
          color: var(--text-2);
          cursor: pointer;
        }
        .forgot {
          color: var(--primary);
          text-decoration: none;
          font-weight: 600;
        }

        .submit-btn {
          width: 100%;
          padding: 14px;
          background: var(--primary);
          color: white;
          border: none;
          border-radius: 12px;
          font-size: 16px;
          font-weight: 600;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
          transition: all 0.2s ease;
          margin-bottom: 24px;
        }
        .submit-btn:hover {
          background: var(--primary-hover);
          transform: translateY(-1px);
          box-shadow: 0 4px 12px var(--primary-glow);
        }
        .submit-btn:active {
          transform: translateY(0);
        }

        .divider {
          display: flex;
          align-items: center;
          gap: 16px;
          margin-bottom: 24px;
          color: var(--text-3);
        }
        .divider::before, .divider::after {
          content: "";
          flex: 1;
          height: 1px;
          background: var(--border);
        }
        .divider span {
          font-size: 13px;
          text-transform: uppercase;
          letter-spacing: 1px;
          font-weight: 500;
        }

        .ghost-btn {
          display: flex;
          align-items: center;
          gap: 12px;
          padding: 12px 16px;
          width: 100%;
          background: var(--surface-2);
          border: 1px solid var(--border);
          border-radius: 12px;
          color: var(--text-1);
          font-size: 14px;
          font-weight: 600;
          text-decoration: none;
          transition: all 0.2s ease;
          margin-bottom: 12px;
        }
        .ghost-btn:hover {
          background: var(--surface-3);
          border-color: var(--text-3);
        }

        .ghost-btn i { color: var(--primary); }

        .toggle-auth {
          text-align: center;
          font-size: 14px;
          color: var(--text-2);
          margin-top: 12px;
        }
        .toggle-auth a {
          color: var(--primary);
          text-decoration: none;
          font-weight: 600;
          margin-left: 4px;
        }

        /* Password strength indicators */
        .strength-wrap {
          margin-top: 8px;
          display: flex;
          flex-direction: column;
          gap: 6px;
        }
        .strength-bar {
          height: 4px;
          background: var(--surface-3);
          border-radius: 2px;
          overflow: hidden;
        }
        .strength-fill {
          height: 100%;
          width: 0;
          transition: all 0.3s ease;
        }
        .strength-label {
          font-size: 12px;
          font-weight: 600;
        }

        /* Strength colors */
        .str-none   { background: var(--border);  color: var(--text-3); }
        .str-weak   { background: var(--error);   color: var(--error);  }
        .str-fair   { background: #f59e0b;        color: #f59e0b;        }
        .str-strong { background: var(--success); color: var(--success);}
        .str-best   { background: #10b981;        color: #10b981;        }

        .pw-rules {
          list-style: none;
          margin-top: 12px;
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 8px;
        }
        .rule {
          display: flex;
          align-items: center;
          gap: 6px;
          font-size: 12px;
          color: var(--text-3);
        }
        .rule-ok { color: var(--success); }
        .rule i { width: 14px; height: 14px; }

        .char-counter {
          font-size: 11px;
          color: var(--text-3);
          margin-top: 4px;
          text-align: right;
        }

        .auth-error {
          background: rgba(239, 68, 68, 0.1);
          border: 1px solid var(--error);
          color: var(--error);
          padding: 12px;
          border-radius: 12px;
          font-size: 13px;
          display: flex;
          align-items: flex-start;
          gap: 10px;
          margin-bottom: 20px;
          animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-4px); }
          75% { transform: translateX(4px); }
        }

        .intelligence-tag {
          margin-top: 32px;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          color: var(--text-3);
          font-size: 12px;
          font-weight: 500;
        }
